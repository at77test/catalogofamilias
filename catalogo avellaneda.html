<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asesor de Ventas — Abelson Express Avellaneda</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f1b2e;--navy-l:#1a2d45;--navy-b:#243347;
  --teal:#0ea5a0;--teal-d:#0d726e;
  --bg:#f0f4f8;--card:#fff;--text:#1e293b;--muted:#64748b;
  --sw:272px;--hh:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
header{height:var(--hh);background:var(--navy);display:flex;align-items:center;padding:0 20px;gap:12px;position:fixed;top:0;left:0;right:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--teal),#0891b2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;letter-spacing:-1px}
.logo-text{color:#fff;line-height:1}
.logo-main{font-weight:700;font-size:14px;display:block}
.logo-sub{font-size:10.5px;color:#94a3b8;font-weight:400;margin-top:2px;display:block}
.h-search{flex:1;max-width:420px;margin-left:auto;position:relative}
.h-search input{width:100%;padding:8px 16px 8px 36px;border-radius:8px;border:1.5px solid var(--navy-b);background:var(--navy-l);color:#fff;font-family:'Outfit',sans-serif;font-size:13.5px;outline:none;transition:border-color .2s}
.h-search input::placeholder{color:#64748b}
.h-search input:focus{border-color:var(--teal)}
.s-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#64748b;font-size:14px}
#priceBtn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--navy-b);background:var(--navy-l);color:#94a3b8;font-family:'Outfit',sans-serif;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
#priceBtn.on{background:var(--teal-d);border-color:var(--teal-d);color:#fff}
.h-badge{background:var(--navy-l);border:1px solid var(--navy-b);border-radius:20px;padding:3px 10px;font-size:11px;color:#94a3b8;white-space:nowrap;flex-shrink:0}

/* LAYOUT */
.layout{display:flex;margin-top:var(--hh);min-height:calc(100vh - var(--hh))}
aside{width:var(--sw);background:var(--navy);position:fixed;top:var(--hh);left:0;bottom:0;overflow-y:auto;padding:8px 8px 20px;display:flex;flex-direction:column}
aside::-webkit-scrollbar{width:3px}
aside::-webkit-scrollbar-thumb{background:var(--navy-b);border-radius:2px}
.s-sec{margin-top:4px}
.s-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#475569;padding:5px 10px 2px;display:block}
.cat-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;border:none;background:transparent;color:#94a3b8;text-align:left;width:100%;font-family:'Outfit',sans-serif;font-size:12.5px;font-weight:500;transition:background .15s}
.cat-btn:hover{background:var(--navy-l);color:#e2e8f0}
.cat-btn.active{background:linear-gradient(135deg,var(--teal-d),#0369a1);color:#fff}
.cat-btn .ico{font-size:16px;flex-shrink:0}
.cat-btn .cnt{margin-left:auto;font-size:10px;background:rgba(255,255,255,.08);border-radius:10px;padding:1px 6px;font-weight:600}

main{margin-left:var(--sw);flex:1;padding:22px 26px;min-width:0}

/* HOME */
.home-title{font-size:23px;font-weight:800;color:var(--navy);margin-bottom:4px}
.home-sub{color:var(--muted);font-size:13px;margin-bottom:4px}
.sec-t{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;margin-top:18px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:9px}
.cat-card{background:var(--card);border-radius:10px;padding:15px 12px;cursor:pointer;transition:transform .15s,box-shadow .15s;border:1.5px solid transparent;box-shadow:0 1px 3px rgba(0,0,0,.06);text-align:center}
.cat-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(14,165,160,.13);border-color:var(--teal)}
.cat-card .bi{font-size:28px;margin-bottom:6px}
.cat-card .cn{font-size:12.5px;font-weight:600;color:var(--navy);line-height:1.3}
.cat-card .cc{font-size:10px;color:var(--muted);margin-top:3px}

/* PAGE HEADER */
.ph{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.back{background:none;border:none;color:var(--teal);cursor:pointer;font-size:20px;padding:4px;border-radius:6px}
.back:hover{background:#e0f2fe}
.ph-ico{font-size:26px;flex-shrink:0}
.ph-info h1{font-size:18px;font-weight:800;color:var(--navy)}
.ph-info p{font-size:12px;color:var(--muted)}

/* FILTERS */
.frow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.flbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-right:3px}
.ftab{padding:5px 11px;border-radius:20px;border:1.5px solid #e2e8f0;background:var(--card);font-size:11.5px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Outfit',sans-serif}
.ftab:hover{border-color:var(--teal);color:var(--teal)}
.ftab.a1{background:var(--navy);border-color:var(--navy);color:#fff}
.ftab.a2{background:var(--teal-d);border-color:var(--teal-d);color:#fff}

/* PRODUCT GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:7px}
a.pcard{text-decoration:none;color:inherit;display:flex;cursor:pointer;background:var(--card);border-radius:9px;padding:9px 11px;border:1.5px solid #e2e8f0;align-items:flex-start;gap:8px;transition:box-shadow .15s,border-color .15s}
a.pcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.09);border-color:var(--teal)}
.pd{font-size:11.5px;font-weight:500;line-height:1.4;flex:1}
.pm{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.pc{font-family:'DM Mono',monospace;font-size:9.5px;color:#94a3b8;background:#f1f5f9;padding:1px 4px;border-radius:3px;white-space:nowrap}
.pp{font-size:12px;font-weight:700;color:var(--teal);white-space:nowrap}
.ppn{font-size:9px;color:#94a3b8;font-style:italic}
.nil{color:var(--muted);padding:16px 0;font-size:13px}

/* GRIFERÍAS lines */
.brtabs{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.brtab{padding:7px 16px;border-radius:20px;border:1.5px solid #e2e8f0;background:var(--card);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif}
.brtab:hover{border-color:var(--teal);color:var(--teal)}
.brtab.a1{background:var(--navy);border-color:var(--navy);color:#fff}
.lnt{width:100%;border-collapse:separate;border-spacing:0 6px}
.lnh th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:0 10px 3px;text-align:left}
.lnh th:first-child{padding-left:14px}
.lnr{cursor:pointer}
.lnr td{background:var(--card);padding:9px 10px;border-top:1.5px solid #e2e8f0;border-bottom:1.5px solid #e2e8f0}
.lnr td:first-child{border-left:1.5px solid #e2e8f0;border-radius:9px 0 0 9px;padding-left:14px}
.lnr td:last-child{border-right:1.5px solid #e2e8f0;border-radius:0 9px 9px 0;padding-right:14px}
.lnr:hover td,.lnr.exp td{background:#f0f9ff;border-color:var(--teal)}
.ln-n{font-weight:700;font-size:13px;color:var(--navy)}
.ln-a{font-size:11px;color:var(--muted);margin-top:1px}
.lnchip{font-size:10.5px;font-weight:500;line-height:1.35}
.lncod{font-family:'DM Mono',monospace;font-size:9px;color:#94a3b8}
.lnpr{font-size:12px;font-weight:700;color:var(--teal);white-space:nowrap}
.lnem{font-size:11px;color:#cbd5e1;font-style:italic}
.lndet{background:#f0f9ff;border:1.5px solid var(--teal);border-radius:9px;padding:13px}
.ldg{display:grid;gap:12px}
.ldch{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--teal);margin-bottom:6px;padding-bottom:4px;border-bottom:2px solid var(--teal)}
a.ldit{text-decoration:none;color:inherit;display:flex;flex-direction:column;padding:5px 0;border-bottom:1px solid #bae6fd}
a.ldit:last-child{border-bottom:none}
a.ldit:hover{background:#e0f2fe;padding-left:4px;border-radius:3px}
.ldd{font-size:11px;font-weight:500;line-height:1.35}
.ldr{display:flex;align-items:center;gap:4px;margin-top:2px}
.ldc{font-family:'DM Mono',monospace;font-size:9px;color:#94a3b8;background:#e0f2fe;padding:1px 4px;border-radius:3px}
.ldp{font-size:11px;font-weight:700;color:var(--teal-d);margin-left:auto}

/* SEARCH */
.srlist{display:flex;flex-direction:column;gap:6px}
a.src{text-decoration:none;color:inherit;display:flex;background:var(--card);border-radius:9px;padding:9px 13px;border:1.5px solid #e2e8f0;align-items:center;gap:10px;transition:box-shadow .15s,border-color .15s}
a.src:hover{box-shadow:0 2px 6px rgba(0,0,0,.08);border-color:var(--teal)}
.srd{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--teal)}
.sri{flex:1;min-width:0}
.srtxt{font-size:12.5px;font-weight:500}
.srcat{font-size:10.5px;color:var(--muted)}
.srcod{font-family:'DM Mono',monospace;font-size:10px;color:#94a3b8;background:#f1f5f9;padding:1px 5px;border-radius:4px;flex-shrink:0}
.srp{font-size:12px;font-weight:700;color:var(--teal);white-space:nowrap}
.price-val{font-variant-numeric:tabular-nums}
#priceBtn.on{background:var(--teal-d)!important;border-color:var(--teal-d)!important;color:#fff!important}
.no-res{text-align:center;padding:50px 0;color:var(--muted)}

@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .2s ease}
@media(max-width:900px){:root{--sw:200px}main{padding:14px}.ldg{grid-template-columns:1fr!important}}
@media(max-width:600px){aside{display:none}main{margin-left:0}}
</style>
</head>

  <div class="h-badge" id="badge"></div>
</header>
<div class="layout">
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>

let activeCat=null,activeBrand=null,showPrices=false;
const ST={};
const fmt=p=>'$'+Math.round(p).toLocaleString('es-AR');
function aUrl(cod){return URL_MAP[cod]||`https://www.abelson.com.ar/buscar?controller=search&s=${encodeURIComponent(cod)}`;}
function P(p){return`<span class="price-val" data-v="${fmt(p)}">${showPrices?fmt(p):'••••••'}</span>`;}

function togglePrices(){
  showPrices=!showPrices;
  document.querySelectorAll('.price-val').forEach(el=>el.textContent=showPrices?el.dataset.v:'••••••');
  const btn=document.getElementById('priceBtn');
  btn.textContent=showPrices?'🔒 Ocultar precios':'🔓 Ver precios';
  btn.classList.toggle('on',showPrices);
}

function ccount(c){
  const t=c.type;
  if(t==='lines') return Object.values(c.brands).flatMap(ls=>Object.values(ls).flatMap(ts=>Object.values(ts).flat())).length;
  if(t==='groups'||t==='termotanques') return Object.values(c.groups).flat().length;
  if(t==='groups_by_family') return Object.values(c.families).flatMap(fam=>Object.values(fam).flat()).length;
  return 0;
}

/* SIDEBAR */
function buildSidebar(){
  let h='';
  for(const[lbl,ids] of SECS){
    h+=`<div class="s-sec"><span class="s-lbl">${lbl}</span>`;
    for(const id of ids){const c=CAT[id];if(!c)continue;h+=`<button class="cat-btn" id="btn-${id}" onclick="showCat('${id}')"><span class="ico">${c.icon}</span><span>${LBL[id]||c.name}</span><span class="cnt">${ccount(c)}</span></button>`;}
    h+='</div>';
  }
  document.getElementById('sidebar').innerHTML=h;
  document.getElementById('badge').textContent=Object.values(CAT).reduce((s,c)=>s+ccount(c),0).toLocaleString('es-AR')+' artículos';
}
function setActive(id){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));if(id)document.getElementById('btn-'+id)?.classList.add('active');}

function showHome(){
  activeCat=null;setActive(null);document.getElementById('gs').value='';
  let h=`<div class="fade"><div class="home-title">👋 ¿Qué busca el cliente?</div><div class="home-sub">Seleccioná una categoría para ver los productos.</div>`;
  for(const[lbl,ids] of SECS){
    const cats=ids.filter(id=>CAT[id]);if(!cats.length)continue;
    h+=`<div class="sec-t">${lbl}</div><div class="cat-grid">`;
    for(const id of cats){const c=CAT[id];h+=`<div class="cat-card" onclick="showCat('${id}')"><div class="bi">${c.icon}</div><div class="cn">${LBL[id]||c.name}</div><div class="cc">${ccount(c)} productos</div></div>`;}
    h+='</div>';
  }
  document.getElementById('main').innerHTML=h+'</div>';
}

function showCat(id){
  activeCat=id;setActive(id);document.getElementById('gs').value='';
  const c=CAT[id];
  if(c.type==='lines') renderLines(id,c);
  else if(c.type==='groups') renderGroups(id,c);
  else if(c.type==='termotanques') renderTermo(id,c);
  else if(c.type==='groups_by_family') renderFamilies(id,c);
}

function phdr(c,sub){
  return`<div class="ph"><button class="back" onclick="showHome()">←</button><span class="ph-ico">${c.icon}</span><div class="ph-info"><h1>${LBL[activeCat]||c.name}</h1><p>${sub||c.description}</p></div></div>`;
}

/* PRODUCT GRID */
function pgrid(prods){
  if(!prods||!prods.length)return'<div class="nil">Sin productos.</div>';
  return'<div class="pgrid">'+prods.map(p=>`<a class="pcard" href="${aUrl(p.cod)}" target="_blank"><div class="pd">${p.desc}</div><div class="pm"><span class="pc">${p.cod}</span><span class="pp">${P(p.precio)}</span><span class="ppn">sin IVA</span></div></a>`).join('')+'</div>';
}

/* GROUPS */
function renderGroups(id,c,sel){
  if(!ST[id])ST[id]={g:null};
  const grps=c.groups,first=sel||ST[id].g||Object.keys(grps)[0];ST[id].g=first;
  let h=phdr(c,c.description+' · '+Object.values(grps).flat().length+' productos');
  h+='<div class="frow" id="gtabs">';
  for(const g of Object.keys(grps))h+=`<button class="ftab${g===first?' a1':''}" onclick="swGrp('${id}','${g}',this)">${g} <span style="opacity:.5;font-size:10px">(${grps[g].length})</span></button>`;
  h+=`</div><div id="glist">${pgrid(grps[first])}</div>`;
  document.getElementById('main').innerHTML='<div class="fade">'+h+'</div>';
}
function swGrp(id,g,btn){ST[id].g=g;document.querySelectorAll('#gtabs .ftab').forEach(b=>b.classList.remove('a1'));btn.classList.add('a1');document.getElementById('glist').innerHTML=pgrid(CAT[id].groups[g]);}

/* GROUPS BY FAMILY (2-level: family tab → sub-group tab) */
function renderFamilies(id,c,selFam,selGrp){
  if(!ST[id])ST[id]={fam:null,grp:null};
  const fams=c.families;
  const firstFam=selFam||ST[id].fam||Object.keys(fams)[0];ST[id].fam=firstFam;
  const grps=fams[firstFam];
  const firstGrp=selGrp||ST[id].grp||Object.keys(grps)[0];ST[id].grp=firstGrp;
  const total=Object.values(fams).flatMap(f=>Object.values(f).flat()).length;
  let h=phdr(c,c.description+' · '+total+' productos');
  // Family tabs
  h+='<div class="frow" id="famtabs"><span class="flbl">Familia:</span>';
  for(const f of Object.keys(fams)){const n=Object.values(fams[f]).flat().length;h+=`<button class="ftab${f===firstFam?' a1':''}" onclick="swFam('${id}','${f}',this)">${f} <span style="opacity:.5;font-size:10px">(${n})</span></button>`;}
  h+='</div>';
  // Sub-group tabs
  h+=`<div class="frow" id="grptabs"><span class="flbl">Grupo:</span>`;
  for(const g of Object.keys(grps))h+=`<button class="ftab${g===firstGrp?' a2':''}" onclick="swFamGrp('${id}','${g}',this)">${g} <span style="opacity:.5;font-size:10px">(${grps[g].length})</span></button>`;
  h+=`</div><div id="flist">${pgrid(grps[firstGrp])}</div>`;
  document.getElementById('main').innerHTML='<div class="fade">'+h+'</div>';
}
function swFam(id,fam,btn){
  ST[id].fam=fam;ST[id].grp=null;
  document.querySelectorAll('#famtabs .ftab').forEach(b=>b.classList.remove('a1'));btn.classList.add('a1');
  const grps=CAT[id].families[fam];const firstGrp=Object.keys(grps)[0];ST[id].grp=firstGrp;
  let h='<div class="frow" id="grptabs"><span class="flbl">Grupo:</span>';
  for(const g of Object.keys(grps))h+=`<button class="ftab${g===firstGrp?' a2':''}" onclick="swFamGrp('${id}','${g}',this)">${g} <span style="opacity:.5;font-size:10px">(${grps[g].length})</span></button>`;
  h+=`</div><div id="flist">${pgrid(grps[firstGrp])}</div>`;
  document.getElementById('grptabs').outerHTML=h;
}
function swFamGrp(id,g,btn){
  ST[id].grp=g;document.querySelectorAll('#grptabs .ftab').forEach(b=>{b.classList.remove('a2');});btn.classList.add('a2');
  document.getElementById('flist').innerHTML=pgrid(CAT[id].families[ST[id].fam][g]);
}

/* TERMOTANQUES dual filter */
function renderTermo(id,c){
  if(!ST[id])ST[id]={tipo:null,lts:'Todos'};
  const t0=ST[id].tipo||Object.keys(c.groups)[0];ST[id].tipo=t0;
  const total=Object.values(c.groups).flat().length;
  let h=phdr(c,c.description+' · '+total+' productos');
  h+='<div class="frow"><span class="flbl">Tipo:</span>';
  for(const t of Object.keys(c.groups))h+=`<button class="ftab${t===t0?' a1':''}" onclick="swTipo('${id}','${t}',this)">${t}</button>`;
  h+='</div><div id="lbar" class="frow"></div><div id="tlist"></div>';
  document.getElementById('main').innerHTML='<div class="fade">'+h+'</div>';
  buildLts(id,t0);
}
function buildLts(id,tipo){
  const prods=CAT[id].groups[tipo]||[];
  const lts=['Todos',...[...new Set(prods.map(p=>p.lts).filter(Boolean))].sort((a,b)=>a-b).map(String)];
  const cur=lts.includes(ST[id].lts)?ST[id].lts:'Todos';ST[id].lts=cur;
  document.getElementById('lbar').innerHTML='<span class="flbl">Litros:</span>'+lts.map(l=>`<button class="ftab${l===cur?' a1 a2':''}" onclick="swLts('${id}','${l}',this)">${l==='Todos'?'Todos':l+' L'}</button>`).join('');
  document.getElementById('tlist').innerHTML=pgrid(cur==='Todos'?prods:prods.filter(p=>p.lts===Number(cur)));
}
function swTipo(id,tipo,btn){ST[id].tipo=tipo;ST[id].lts='Todos';document.querySelectorAll('.frow .ftab[onclick^="swTipo"]').forEach(b=>b.classList.remove('a1'));btn.classList.add('a1');buildLts(id,tipo);}
function swLts(id,lts,btn){ST[id].lts=lts;document.querySelectorAll('#lbar .ftab').forEach(b=>{b.classList.remove('a1','a2')});btn.classList.add('a1','a2');const prods=CAT[id].groups[ST[id].tipo]||[];document.getElementById('tlist').innerHTML=pgrid(lts==='Todos'?prods:prods.filter(p=>p.lts===Number(lts)));}

/* GRIFERÍAS lines */
function renderLines(id,c,sb){
  const brands=c.brands,first=sb||activeBrand||Object.keys(brands)[0];activeBrand=first;
  const total=Object.values(brands).flatMap(ls=>Object.values(ls).flatMap(ts=>Object.values(ts).flat())).length;
  let h=phdr(c,c.description+' · '+total+' productos');
  h+='<div class="brtabs" id="btabs">';
  for(const br of Object.keys(brands))h+=`<button class="brtab${br===first?' a1':''}" onclick="swBr('${id}','${br}',this)">${br}</button>`;
  h+=`</div><div id="larea">${brLines(brands[first])}</div>`;
  document.getElementById('main').innerHTML='<div class="fade">'+h+'</div>';
}
function brLines(lines){
  let h=`<table class="lnt"><thead class="lnh"><tr><th>Línea</th><th>Lavatorio</th><th>Bidet</th><th>Ducha</th><th>Desde</th></tr></thead><tbody>`;
  for(const[ln,tipos] of Object.entries(lines)){
    const lav=(tipos.lavatorio||[])[0],bid=(tipos.bidet||[])[0],duc=(tipos.ducha||[])[0];
    const min=Math.min(...Object.values(tipos).flat().map(x=>x.precio));
    const lid='ln'+ln.replace(/[^a-z0-9]/gi,'_');
    h+=`<tr class="lnr" id="tr-${lid}" onclick="togLn('${lid}')">
      <td><div class="ln-n">${ln}</div><div class="ln-a">desde ${P(min)}</div></td>
      <td>${lav?`<div class="lnchip">${sd(lav.desc)}</div><div class="lncod">${lav.cod}</div>`:'<span class="lnem">—</span>'}</td>
      <td>${bid?`<div class="lnchip">${sd(bid.desc)}</div><div class="lncod">${bid.cod}</div>`:'<span class="lnem">—</span>'}</td>
      <td>${duc?`<div class="lnchip">${sd(duc.desc)}</div><div class="lncod">${duc.cod}</div>`:'<span class="lnem">—</span>'}</td>
      <td>${P(min)}</td>
    </tr>
    <tr id="det-${lid}" style="display:none"><td colspan="5" style="padding:0 4px 6px"><div class="lndet">${ldDetail(tipos)}</div></td></tr>`;
  }
  return h+'</tbody></table>';
}
function sd(d){return d.replace(/^(ROCA|PEIRANO|PIAZZA|HYDROS|HIDROS|FV)\s*/i,'').slice(0,42);}
function ldDetail(tipos){
  const ord=['lavatorio','bidet','ducha','cocina'],avail=ord.filter(t=>tipos[t]&&tipos[t].length);
  if(!avail.length)return'';
  let h=`<div class="ldg" style="grid-template-columns:repeat(${Math.min(avail.length,3)},1fr)">`;
  for(const t of avail){
    h+=`<div><div class="ldch">${TIPO[t]||t}</div>`;
    for(const p of tipos[t])h+=`<a class="ldit" href="${aUrl(p.cod)}" target="_blank"><div class="ldd">${sd(p.desc)}</div><div class="ldr"><span class="ldc">${p.cod}</span><span class="ldp">${P(p.precio)}</span></div></a>`;
    h+='</div>';
  }
  return h+'</div><div style="font-size:9px;color:#94a3b8;margin-top:6px;font-style:italic">Precios lista sin IVA</div>';
}
function togLn(lid){
  const det=document.getElementById('det-'+lid),tr=document.getElementById('tr-'+lid);if(!det)return;
  const open=det.style.display!=='none';
  document.querySelectorAll('[id^="det-"]').forEach(r=>r.style.display='none');
  document.querySelectorAll('.lnr').forEach(r=>r.classList.remove('exp'));
  if(!open){det.style.display='';tr.classList.add('exp');}
}
function swBr(id,br,btn){activeBrand=br;document.querySelectorAll('#btabs .brtab').forEach(b=>b.classList.remove('a1'));btn.classList.add('a1');document.getElementById('larea').innerHTML=brLines(CAT[id].brands[br]);}

/* SEARCH */
function allProds(){
  const out=[];
  for(const[cid,c] of Object.entries(CAT)){
    const ci=c.icon,cn=LBL[cid]||c.name;
    const add=(prods,x={})=>{for(const p of prods)out.push({...p,ci,cn,...x});};
    if(c.type==='lines') for(const[br,ls] of Object.entries(c.brands)) for(const[ln,ts] of Object.entries(ls)) for(const[t,a] of Object.entries(ts)) add(a,{br,ln,t});
    else if(c.type==='groups'||c.type==='termotanques') Object.values(c.groups).forEach(a=>add(a));
    else if(c.type==='groups_by_family') for(const fdata of Object.values(c.families)) Object.values(fdata).forEach(a=>add(a));
  }
  return out;
}
let _cache=null;
function doSearch(q){
  q=q.trim().toLowerCase();
  if(!q){activeCat?showCat(activeCat):showHome();return;}
  setActive(null);
  if(!_cache)_cache=allProds();
  const res=_cache.filter(p=>p.desc.toLowerCase().includes(q)||p.cod.includes(q)).sort((a,b)=>a.precio-b.precio);
  if(!res.length){document.getElementById('main').innerHTML=`<div class="fade no-res" style="text-align:center;padding:50px;color:var(--muted)"><div style="font-size:36px;margin-bottom:8px">🔍</div><div>Sin resultados para <strong>"${q}"</strong></div></div>`;return;}
  const list=res.slice(0,120).map(r=>`<a class="src" href="${aUrl(r.cod)}" target="_blank"><div class="srd"></div><div class="sri"><div class="srtxt">${r.desc}</div><div class="srcat">${r.ci} ${r.cn}${r.ln?' · '+r.br+' '+r.ln:''}</div></div><span class="srcod">${r.cod}</span><span class="srp">${P(r.precio)}</span></a>`).join('');
  const extra=res.length>120?`<div style="text-align:center;padding:10px;color:#94a3b8;font-size:11.5px">Mostrando 120 de ${res.length} resultados.</div>`:'';
  document.getElementById('main').innerHTML=`<div class="fade"><h2 style="font-size:17px;font-weight:700;margin-bottom:4px">Resultados para "${q}"</h2><div style="font-size:12px;color:var(--muted);margin-bottom:13px">${res.length} producto${res.length!==1?'s':''} · orden de precio</div><div class="srlist">${list}</div>${extra}</div>`;
}
let _st;
document.getElementById('gs').addEventListener('input',e=>{clearTimeout(_st);_st=setTimeout(()=>doSearch(e.target.value),250)});
buildSidebar();showHome();
</script>
</body>
